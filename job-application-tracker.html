<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireTrack — Job Application Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #03030a;
    --surface: #09090f;
    --card: #0f0f1a;
    --border: #1c1c2e;
    --accent: #8b5cf6;
    --blue: #3b82f6;
    --green: #10b981;
    --yellow: #f59e0b;
    --red: #ef4444;
    --orange: #f97316;
    --text: #f0f0ff;
    --muted: #6b6b9a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 2rem; border-bottom: 1px solid var(--border);
    background: rgba(3,3,10,0.9); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 200;
  }
  .logo { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg,#8b5cf6,#3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .btn-add { background: var(--accent); color: white; border: none; padding: 0.55rem 1.2rem; border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .btn-add:hover { opacity: 0.85; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; padding: 1.5rem 2rem; }
  @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(3,1fr); } }
  @media (max-width: 600px) { .stats-row { grid-template-columns: repeat(2,1fr); } }

  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.1rem 1.2rem; }
  .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.5rem; font-weight: 600; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; line-height: 1; }
  .stat-sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

  /* MAIN LAYOUT */
  .content { display: grid; grid-template-columns: 1fr 360px; gap: 1.5rem; padding: 0 2rem 2rem; }
  @media (max-width: 1000px) { .content { grid-template-columns: 1fr; } }

  /* TABLE */
  .table-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .table-header { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); }
  .table-title { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }

  .filter-tabs { display: flex; gap: 0.4rem; }
  .tab { padding: 0.35rem 0.8rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  .app-table { width: 100%; border-collapse: collapse; }
  .app-table th { padding: 0.8rem 1rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 600; }
  .app-table td { padding: 1rem; border-bottom: 1px solid rgba(28,28,46,0.5); font-size: 0.875rem; vertical-align: middle; }
  .app-table tr:last-child td { border-bottom: none; }
  .app-table tr:hover td { background: rgba(139,92,246,0.04); }

  .company-cell { display: flex; align-items: center; gap: 0.8rem; }
  .company-logo { width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; flex-shrink: 0; }
  .company-name { font-weight: 600; }
  .company-role { font-size: 0.78rem; color: var(--muted); }

  .status-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .s-applied { background: rgba(59,130,246,0.15); color: #3b82f6; }
  .s-interview { background: rgba(245,158,11,0.15); color: #f59e0b; }
  .s-offer { background: rgba(16,185,129,0.15); color: #10b981; }
  .s-rejected { background: rgba(239,68,68,0.15); color: #ef4444; }
  .s-waitlist { background: rgba(139,92,246,0.15); color: #8b5cf6; }

  .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  .action-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; margin-right: 0.3rem; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .del-btn:hover { border-color: var(--red); color: var(--red); }

  /* RIGHT PANEL */
  .right-panel { display: flex; flex-direction: column; gap: 1.2rem; }

  .panel-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.3rem; }
  .panel-title { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1rem; }

  .chart-wrap { position: relative; height: 180px; }

  .deadline-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
  .deadline-item:last-child { border-bottom: none; }
  .deadline-date { font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; min-width: 40px; text-align: center; line-height: 1.2; }
  .deadline-info { flex: 1; }
  .deadline-co { font-size: 0.85rem; font-weight: 600; }
  .deadline-role { font-size: 0.75rem; color: var(--muted); }
  .days-left { font-size: 0.75rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; }

  .ai-insight { background: linear-gradient(135deg,rgba(139,92,246,0.1),rgba(59,130,246,0.1)); border: 1px solid rgba(139,92,246,0.25); border-radius: 14px; padding: 1.3rem; }
  .ai-top { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 0.8rem; }
  .ai-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .ai-text { font-size: 0.875rem; line-height: 1.7; color: #c0c0e0; }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 90%; max-width: 500px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800; margin-bottom: 1.5rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  .form-full { grid-column: 1 / -1; }
  label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
  input, select, textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.65rem 0.9rem; color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; }
  .btn-save { flex: 1; padding: 0.75rem; background: var(--accent); border: none; border-radius: 8px; color: white; font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; }
  .btn-cancel { padding: 0.75rem 1.2rem; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; cursor: pointer; }

  .empty-row td { text-align: center; padding: 3rem; color: var(--muted); }

  .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem 1rem; color: var(--text); font-size: 0.85rem; outline: none; width: 180px; }
</style>
</head>
<body>

<nav>
  <div class="logo">HireTrack 🎯</div>
  <button class="btn-add" onclick="openModal()">+ Add Application</button>
</nav>

<!-- STATS -->
<div class="stats-row" id="statsRow"></div>

<!-- CONTENT -->
<div class="content">
  <div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Applications</div>
        <div style="display:flex;gap:0.8rem;align-items:center;flex-wrap:wrap">
          <input class="search-box" placeholder="🔍 Search..." oninput="renderTable(this.value)">
          <div class="filter-tabs">
            <button class="tab active" onclick="setFilter('All',this)">All</button>
            <button class="tab" onclick="setFilter('Applied',this)">Applied</button>
            <button class="tab" onclick="setFilter('Interview',this)">Interview</button>
            <button class="tab" onclick="setFilter('Offer',this)">Offer</button>
          </div>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="app-table">
          <thead>
            <tr>
              <th>Company & Role</th>
              <th>Status</th>
              <th>Applied</th>
              <th>Deadline</th>
              <th>Priority</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="appTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-card">
      <div class="panel-title">Status Breakdown</div>
      <div class="chart-wrap"><canvas id="statusChart"></canvas></div>
    </div>

    <div class="panel-card">
      <div class="panel-title">Upcoming Deadlines</div>
      <div id="deadlineList"></div>
    </div>

    <div class="ai-insight">
      <div class="ai-top"><div class="ai-dot"></div><span style="font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:700">AI Job Search Tips</span></div>
      <div class="ai-text" id="aiTip">Click a row or add applications to get personalized AI advice for your job search.</div>
      <button onclick="getAITip()" style="margin-top:0.8rem;background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.4);color:#a78bfa;padding:0.4rem 0.9rem;border-radius:6px;font-size:0.8rem;cursor:pointer;font-weight:600">✦ Get AI Tips</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add Application</div>
    <div class="form-grid">
      <div>
        <label>Company Name *</label>
        <input type="text" id="fCompany" placeholder="e.g. Google">
      </div>
      <div>
        <label>Job Role *</label>
        <input type="text" id="fRole" placeholder="e.g. Frontend Developer">
      </div>
      <div>
        <label>Status</label>
        <select id="fStatus">
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
          <option value="Waitlist">Waitlist</option>
        </select>
      </div>
      <div>
        <label>Priority</label>
        <select id="fPriority">
          <option value="High">🔴 High</option>
          <option value="Medium">🟡 Medium</option>
          <option value="Low">🟢 Low</option>
        </select>
      </div>
      <div>
        <label>Date Applied</label>
        <input type="date" id="fDate">
      </div>
      <div>
        <label>Deadline</label>
        <input type="date" id="fDeadline">
      </div>
      <div>
        <label>Location</label>
        <input type="text" id="fLocation" placeholder="e.g. Bangalore, Remote">
      </div>
      <div>
        <label>Salary (LPA)</label>
        <input type="text" id="fSalary" placeholder="e.g. 8-12 LPA">
      </div>
      <div class="form-full">
        <label>Notes</label>
        <textarea id="fNotes" placeholder="Interview notes, contacts, links..."></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveApplication()">Save Application</button>
    </div>
  </div>
</div>

<script>
  let apps = JSON.parse(localStorage.getItem('hiretrack_apps') || '[]');
  let editId = null;
  let currentFilter = 'All';
  let statusChart;

  const statusClass = { Applied:'s-applied', Interview:'s-interview', Offer:'s-offer', Rejected:'s-rejected', Waitlist:'s-waitlist' };
  const statusDot = { High:'#ef4444', Medium:'#f59e0b', Low:'#10b981' };
  const companyColors = ['#8b5cf6','#3b82f6','#10b981','#f59e0b','#ef4444','#f97316','#06b6d4','#ec4899'];

  document.getElementById('fDate').value = new Date().toISOString().split('T')[0];

  function save() { localStorage.setItem('hiretrack_apps', JSON.stringify(apps)); }

  function openModal(id = null) {
    editId = id;
    document.getElementById('modalTitle').textContent = id ? 'Edit Application' : 'Add Application';
    if (id) {
      const a = apps.find(x => x.id === id);
      document.getElementById('fCompany').value = a.company;
      document.getElementById('fRole').value = a.role;
      document.getElementById('fStatus').value = a.status;
      document.getElementById('fPriority').value = a.priority;
      document.getElementById('fDate').value = a.date;
      document.getElementById('fDeadline').value = a.deadline || '';
      document.getElementById('fLocation').value = a.location || '';
      document.getElementById('fSalary').value = a.salary || '';
      document.getElementById('fNotes').value = a.notes || '';
    } else {
      ['fCompany','fRole','fDeadline','fLocation','fSalary','fNotes'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('fStatus').value = 'Applied';
      document.getElementById('fPriority').value = 'Medium';
      document.getElementById('fDate').value = new Date().toISOString().split('T')[0];
    }
    document.getElementById('modalBg').classList.add('open');
  }

  function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

  function saveApplication() {
    const company = document.getElementById('fCompany').value.trim();
    const role = document.getElementById('fRole').value.trim();
    if (!company || !role) { alert('Company and Role are required!'); return; }

    const app = {
      id: editId || Date.now(),
      company, role,
      status: document.getElementById('fStatus').value,
      priority: document.getElementById('fPriority').value,
      date: document.getElementById('fDate').value,
      deadline: document.getElementById('fDeadline').value,
      location: document.getElementById('fLocation').value,
      salary: document.getElementById('fSalary').value,
      notes: document.getElementById('fNotes').value,
    };

    if (editId) { apps = apps.map(a => a.id === editId ? app : a); }
    else { apps.unshift(app); }

    save(); closeModal(); render();
  }

  function deleteApp(id) {
    if (!confirm('Delete this application?')) return;
    apps = apps.filter(a => a.id !== id);
    save(); render();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function renderTable(search = '') {
    const body = document.getElementById('appTableBody');
    let filtered = apps;
    if (currentFilter !== 'All') filtered = filtered.filter(a => a.status === currentFilter);
    if (search) filtered = filtered.filter(a => a.company.toLowerCase().includes(search.toLowerCase()) || a.role.toLowerCase().includes(search.toLowerCase()));

    if (filtered.length === 0) {
      body.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2.5rem;color:var(--muted)">No applications found. Add one!</td></tr>';
      return;
    }

    body.innerHTML = filtered.map((a, i) => {
      const logoColor = companyColors[i % companyColors.length];
      const daysLeft = a.deadline ? Math.ceil((new Date(a.deadline) - new Date()) / 86400000) : null;
      const daysStyle = daysLeft !== null ? (daysLeft < 3 ? 'color:#ef4444' : daysLeft < 7 ? 'color:#f59e0b' : 'color:#10b981') : '';
      return `
        <tr>
          <td>
            <div class="company-cell">
              <div class="company-logo" style="background:${logoColor}20;color:${logoColor}">${a.company[0]}</div>
              <div>
                <div class="company-name">${a.company}</div>
                <div class="company-role">${a.role}${a.location ? ' · ' + a.location : ''}</div>
              </div>
            </div>
          </td>
          <td><span class="status-badge ${statusClass[a.status]}">${a.status}</span></td>
          <td style="color:var(--muted);font-size:0.82rem">${a.date}</td>
          <td style="font-size:0.82rem;${daysStyle}">${a.deadline ? a.deadline + (daysLeft !== null ? '<br><span style="font-size:0.75rem">' + (daysLeft >= 0 ? daysLeft + 'd left' : 'Expired') + '</span>' : '') : '<span style="color:var(--muted)">—</span>'}</td>
          <td><span class="priority-dot" style="background:${statusDot[a.priority]}"></span> ${a.priority}</td>
          <td>
            <button class="action-btn" onclick="openModal(${a.id})">✏️</button>
            <button class="action-btn del-btn" onclick="deleteApp(${a.id})">🗑️</button>
          </td>
        </tr>
      `;
    }).join('');
  }

  function renderStats() {
    const total = apps.length;
    const interviews = apps.filter(a => a.status === 'Interview').length;
    const offers = apps.filter(a => a.status === 'Offer').length;
    const rejected = apps.filter(a => a.status === 'Rejected').length;
    const rate = total > 0 ? Math.round((interviews / total) * 100) : 0;

    document.getElementById('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-label">Total Applied</div><div class="stat-value" style="color:#8b5cf6">${total}</div><div class="stat-sub">applications tracked</div></div>
      <div class="stat-card"><div class="stat-label">Interviews</div><div class="stat-value" style="color:#f59e0b">${interviews}</div><div class="stat-sub">scheduled / done</div></div>
      <div class="stat-card"><div class="stat-label">Offers</div><div class="stat-value" style="color:#10b981">${offers}</div><div class="stat-sub">received 🎉</div></div>
      <div class="stat-card"><div class="stat-label">Response Rate</div><div class="stat-value" style="color:#3b82f6">${rate}%</div><div class="stat-sub">interview rate</div></div>
      <div class="stat-card"><div class="stat-label">Rejected</div><div class="stat-value" style="color:#ef4444">${rejected}</div><div class="stat-sub">keep going! 💪</div></div>
    `;
  }

  function renderChart() {
    const counts = { Applied: 0, Interview: 0, Offer: 0, Rejected: 0, Waitlist: 0 };
    apps.forEach(a => counts[a.status]++);
    if (statusChart) statusChart.destroy();
    statusChart = new Chart(document.getElementById('statusChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(counts),
        datasets: [{ data: Object.values(counts), backgroundColor: ['#3b82f6','#f59e0b','#10b981','#ef4444','#8b5cf6'], borderWidth: 0, hoverOffset: 6 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { color: '#6b6b9a', font: { size: 11 }, padding: 8, boxWidth: 10 } } }
      }
    });
  }

  function renderDeadlines() {
    const upcoming = apps.filter(a => a.deadline).map(a => ({ ...a, daysLeft: Math.ceil((new Date(a.deadline) - new Date()) / 86400000) })).filter(a => a.daysLeft >= 0).sort((a, b) => a.daysLeft - b.daysLeft).slice(0, 4);
    const dl = document.getElementById('deadlineList');
    if (upcoming.length === 0) { dl.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;text-align:center;padding:1rem">No upcoming deadlines</p>'; return; }
    dl.innerHTML = upcoming.map(a => {
      const d = new Date(a.deadline);
      const color = a.daysLeft < 3 ? '#ef4444' : a.daysLeft < 7 ? '#f59e0b' : '#10b981';
      return `
        <div class="deadline-item">
          <div class="deadline-date" style="color:${color}">${d.toLocaleString('default',{month:'short'})}<br>${d.getDate()}</div>
          <div class="deadline-info"><div class="deadline-co">${a.company}</div><div class="deadline-role">${a.role}</div></div>
          <span class="days-left" style="background:${color}20;color:${color}">${a.daysLeft}d</span>
        </div>`;
    }).join('');
  }

  async function getAITip() {
    if (apps.length === 0) { alert('Add some applications first!'); return; }
    document.getElementById('aiTip').textContent = 'Getting personalized tips...';

    const summary = {
      total: apps.length,
      statusBreakdown: apps.reduce((acc, a) => { acc[a.status] = (acc[a.status] || 0) + 1; return acc; }, {}),
      roles: [...new Set(apps.map(a => a.role))].slice(0, 5),
      companies: apps.slice(0, 5).map(a => a.company)
    };

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `You are a career coach. Based on this job search data, give 3 specific, actionable tips to improve success rate. Be encouraging and practical. Context: India job market.

Data: ${JSON.stringify(summary)}

Reply in plain text, 3 short paragraphs, no markdown, no bullet points. Under 120 words total.`
          }]
        })
      });
      const data = await res.json();
      document.getElementById('aiTip').textContent = data.content.map(i => i.text || '').join('');
    } catch (e) {
      document.getElementById('aiTip').textContent = 'Could not load tips. Try again!';
    }
  }

  function render() {
    renderStats();
    renderTable();
    renderChart();
    renderDeadlines();
  }

  // Sample data
  if (apps.length === 0) {
    apps = [
      { id: 1, company: 'Google', role: 'Frontend Developer', status: 'Interview', priority: 'High', date: '2026-06-01', deadline: '2026-07-10', location: 'Bangalore', salary: '25-35 LPA', notes: 'L4 position. HR call done.' },
